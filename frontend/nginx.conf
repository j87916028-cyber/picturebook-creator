server {
    listen 80;
    server_tokens off;   # Hide nginx version from Server header

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────
    # Compresses JSON API responses, JS bundles, CSS, and HTML.
    # Audio/image blobs are already base64-encoded binary and stored
    # as part of large JSON payloads; gzip still reduces the JSON
    # structure overhead (~30-50% for typical project responses).
    # Text-only responses (scripts, suggestions, project lists) see
    # 70-80% reduction.
    gzip            on;
    gzip_vary       on;          # Vary: Accept-Encoding for CDN/proxy correctness
    gzip_proxied    any;         # compress even proxied (backend API) responses
    gzip_comp_level 6;           # balanced speed/ratio (1=fast, 9=best)
    gzip_min_length 1024;        # skip tiny responses where overhead > saving
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ── Security headers (applied to all responses from this server) ───
    # These mirror the headers the FastAPI backend sets for /api/ routes,
    # but nginx must set them independently for static-file responses.
    add_header X-Content-Type-Options  "nosniff"                       always;
    add_header X-Frame-Options         "DENY"                          always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Content Security Policy ──────────────────────────────────
    # Vite build produces zero inline scripts → strict script-src 'self'.
    # React uses inline styles → 'unsafe-inline' for style-src.
    # Audio/images are base64 data URIs → data: for img-src and media-src.
    # Audio downloads use blob: URLs → blob: in media-src.
    # object-src 'none' blocks Flash/plugin-based attacks.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Export endpoint: longer timeout for CPU-bound rendering ──────
    # PDF / EPUB rendering can take up to 5 minutes for large projects
    # (backend _EXPORT_TIMEOUT_SECS = 300).  The general /api/ block uses
    # proxy_read_timeout 120s, which would silently cut the connection and
    # return a 504 before the backend's own timeout fires.
    # This dedicated block raises the ceiling to 310s (5 min + 10s margin).
    location ~ ^/api/projects/[^/]+/export {
        proxy_pass http://backend:8000;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header Host            $host;
        proxy_http_version 1.1;

        client_max_body_size 50m;
        proxy_read_timeout   310s;
        proxy_send_timeout   310s;

        proxy_buffer_size        16k;
        proxy_buffers            8 32k;
        proxy_busy_buffers_size  64k;
    }

    # ── API reverse-proxy to FastAPI backend ──────────────────────
    location /api/ {
        proxy_pass http://backend:8000;

        # Pass real client IP so the backend rate-limiter sees individual
        # IPs instead of nginx's container IP.
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header Host            $host;

        # Let nginx forward the original request headers unchanged.
        # (proxy_pass_request_headers is on by default; the old explicit
        # "Content-Type $content_type" line used a non-existent variable
        # and could blank out the header on some requests.)
        proxy_http_version 1.1;

        # Scene save payloads contain base64-encoded images + audio per
        # scene.  A 5-scene book with Gemini/HF images (~1-2 MB each) and
        # six audio lines (~80 KB each) easily reaches 15-20 MB.
        # The old 2 MB cap caused silent 413 errors, discarding user work.
        client_max_body_size 50m;

        # Give slow connections time to upload/download large payloads.
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;

        # Buffer tuning: allow larger response buffers so image/audio
        # payloads don't stall on the proxy.
        proxy_buffer_size        16k;
        proxy_buffers            8 32k;
        proxy_busy_buffers_size  64k;
    }

    # ── Vite hashed assets: cache forever ─────────────────────────
    # Vite embeds a content hash in every JS/CSS filename (e.g.
    # index-CdZHI6d3.js).  Because the name changes on every build,
    # these files are safe to cache indefinitely in the browser.
    # "immutable" tells the browser never to revalidate while fresh.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        # Inherit the security headers set at the server level.
    }

    # ── SPA entry point: always revalidate ────────────────────────
    # index.html is the loader for the whole SPA; it must never be
    # stale so that users always get the latest asset manifest.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri /index.html;
    }

    # ── SPA fallback ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
