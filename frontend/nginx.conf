server {
    listen 80;
    server_tokens off;   # Hide nginx version from Server header

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml;

    # ── Shared security headers ──────────────────────────────────
    # Nginx's add_header inheritance rule: if ANY location block uses
    # add_header, server-level add_header directives are NOT inherited.
    # Therefore we define a $security_headers variable block and repeat
    # the headers in every location that needs them.
    #
    # NOTE: we intentionally do NOT set Content-Security-Policy at the
    # server level.  The SPA needs strict script-src 'self', but the
    # /api/projects/{id}/export?inline=true HTML uses onclick handlers
    # that require 'unsafe-inline'.  CSP is set per-location instead.

    # ── Export endpoint: longer timeout for CPU-bound rendering ──────
    location ~ ^/api/projects/[^/]+/export {
        proxy_pass http://backend:8000;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header Host            $host;
        proxy_http_version 1.1;

        client_max_body_size 50m;
        proxy_read_timeout   310s;
        proxy_send_timeout   310s;

        proxy_buffer_size        16k;
        proxy_buffers            8 32k;
        proxy_busy_buffers_size  64k;

        # Security headers (no CSP — exported HTML uses inline onclick handlers)
        add_header X-Content-Type-Options  "nosniff"                       always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    }

    # ── API reverse-proxy to FastAPI backend ──────────────────────
    location /api/ {
        proxy_pass http://backend:8000;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header Host            $host;
        proxy_http_version 1.1;

        client_max_body_size 50m;
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;

        proxy_buffer_size        16k;
        proxy_buffers            8 32k;
        proxy_busy_buffers_size  64k;

        # Security headers — backend middleware also sets these, but the
        # Nginx layer ensures they're present even for error responses.
        # No CSP for API responses (JSON doesn't execute scripts).
        add_header X-Content-Type-Options  "nosniff"                       always;
        add_header X-Frame-Options         "DENY"                          always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    }

    # ── Vite hashed assets: cache forever ─────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control           "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options  "nosniff"                       always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }

    # ── SPA entry point: always revalidate ────────────────────────
    location = /index.html {
        add_header Cache-Control           "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options  "nosniff"                       always;
        add_header X-Frame-Options         "DENY"                          always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        try_files $uri /index.html;
    }

    # ── favicon.ico → rewrite to SVG icon ─────────────────────────
    location = /favicon.ico {
        rewrite ^ /icon-192.svg last;
    }

    # ── SPA fallback ──────────────────────────────────────────────
    location / {
        add_header X-Content-Type-Options  "nosniff"                       always;
        add_header X-Frame-Options         "DENY"                          always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' data: blob:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        try_files $uri $uri/ /index.html;
    }
}
