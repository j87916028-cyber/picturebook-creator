<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>繪本有聲書創作工坊</title>
    <meta name="description" content="AI 驅動的兒童繪本有聲書創作工具：角色、劇本、配音、插圖一站完成" />
    <meta name="theme-color" content="#667eea" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Open Graph: social media link previews -->
    <meta property="og:title" content="繪本有聲書創作工坊" />
    <meta property="og:description" content="AI 驅動的兒童繪本有聲書創作工具：角色、劇本、配音、插圖一站完成" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.svg" />
    <style>
      /* Inline splash — shown until React mounts and replaces #root contents.
         Keeps the page visually active during JS parse + first render (~0.5-2 s). */
      .splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f0f4ff;font-family:'Segoe UI','Microsoft JhengHei',sans-serif;color:#667eea}
      .splash-icon{font-size:3rem;animation:pulse 1.5s ease-in-out infinite}
      .splash-text{margin-top:12px;font-size:1.1rem;letter-spacing:0.5px}
      @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.08)}}
      /* Dark splash */
      [data-theme="dark"] .splash{background:#0f1729;color:#8b9cf7}
    </style>
    <script>try{var t=localStorage.getItem('theme');if(t==='dark'||(t!=='light'&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.dataset.theme='dark'}catch(e){}</script>
  </head>
  <body>
    <div id="root"><div class="splash"><span class="splash-icon">📖</span><span class="splash-text">載入中…</span></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
