services:
  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3070:80"
    depends_on:
      - backend
    restart: unless-stopped
