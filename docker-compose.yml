services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: picturebook
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d picturebook"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - DATABASE_URL=postgresql://app:secret@postgres:5432/picturebook
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3070:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
