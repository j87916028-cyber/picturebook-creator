services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: picturebook
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # localhost only — prevents network exposure of hardcoded password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d picturebook"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8001:8000"  # localhost only — production traffic goes through Nginx (port 3070)
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY:-}
      - POLLINATIONS_API_KEY=${POLLINATIONS_API_KEY:-}
      # iFlytek TTS (optional, best Chinese TTS quality)
      - XFYUN_APP_ID=${XFYUN_APP_ID:-}
      - XFYUN_API_KEY=${XFYUN_API_KEY:-}
      - XFYUN_API_SECRET=${XFYUN_API_SECRET:-}
      # Comma-separated CORS origins (optional, defaults to localhost dev ports)
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - DATABASE_URL=postgresql://app:secret@postgres:5432/picturebook
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3070:80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options: { max-size: "5m", max-file: "3" }
    restart: unless-stopped

volumes:
  pg_data:
